# WebSocket proxy para o SignalR Hub (GatewaySunteh4G-NET8)
# Aplique este snippet dentro de CADA VirtualHost HTTPS no servidor:
#
#   cliente.bltrastreamentos.com.br  → /etc/apache2/sites-available/cliente.conf
#   cliente-hmp.bltrastreamentos.com.br → .../cliente-hmp.conf
#
# Módulos necessários (habilite uma vez):
#   sudo a2enmod proxy proxy_http proxy_wstunnel
#   sudo systemctl reload apache2
#
# Cole o bloco abaixo dentro do <VirtualHost *:443> correspondente,
# ANTES do bloco ProxyPass do PHP-FPM (se houver), ou ao final do VirtualHost.
# ---------------------------------------------------------------------------

    # ── SignalR Hub WebSocket proxy ─────────────────────────────────────────
    <Location /hub/posicoes>
        # Permite apenas upgrade WebSocket; rejeita requisições HTTP puras
        RewriteEngine On
        RewriteCond %{HTTP:Upgrade} !=websocket [NC]
        RewriteRule .* - [F]

        ProxyPreserveHost On
        ProxyPass        ws://127.0.0.1:9055/hub/posicoes
        ProxyPassReverse ws://127.0.0.1:9055/hub/posicoes
    </Location>

    # ── Proteção de origem ──────────────────────────────────────────────────
    # Bloqueia conexões WebSocket de origens não autorizadas
    <Location /hub/posicoes>
        SetEnvIf Origin "^https://(cliente|cliente-hmp)\.bltrastreamentos\.com\.br$" VALID_ORIGIN=1
        # Descomente para restringir (mantenha comentado durante testes):
        # Require env VALID_ORIGIN
    </Location>
