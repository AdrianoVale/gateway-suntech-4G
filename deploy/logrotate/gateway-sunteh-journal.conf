# Rotacao recomendada para arquivo de log da aplicacao (fallback operacional)
# A propria aplicacao ja faz rotacao diaria e retencao de arquivados.
# Este arquivo atua como protecao adicional para gateway-atual.log.

/opt/gateway-sunteh/log/gateway-atual.log {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    su adriano adriano
}

# Os arquivados da aplicacao sao gerenciados pela propria app (RetentionDays=3).
# Portanto, nao aplicamos logrotate em /opt/gateway-sunteh/log/arquivados/*.log
