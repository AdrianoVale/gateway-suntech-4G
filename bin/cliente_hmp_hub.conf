# ─── cliente-hmp.bltrastreamentos.com.br ─────────────────────────────────────
# HTTP → HTTPS redirect
<VirtualHost *:80>
    ServerName  cliente-hmp.bltrastreamentos.com.br
    ServerAlias www.cliente-hmp.bltrastreamentos.com.br

    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# HTTPS
<VirtualHost *:443>
    ServerName  cliente-hmp.bltrastreamentos.com.br
    ServerAlias www.cliente-hmp.bltrastreamentos.com.br
    DocumentRoot /var/www/html/app-mobile

    SSLEngine             on
    SSLCertificateFile    /etc/ssl/blt/bltrastreamentos.crt
    SSLCertificateKeyFile /etc/ssl/blt/bltrastreamentos.key

    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder   off

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"

    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php8.3-fpm-blt.sock|fcgi://localhost"
    </FilesMatch>

    <Directory /var/www/html/app-mobile>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/cliente-hmp-error.log
    CustomLog ${APACHE_LOG_DIR}/cliente-hmp-access.log combined

    # ── SignalR Hub WebSocket proxy ──────────────────────────────────────────
    # WebSocket upgrades → ws://; HTTP negotiate/polling → http://
    ProxyRequests Off
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/hub/(.*)$ ws://127.0.0.1:9055/hub/$1 [P,L]
    ProxyPass        /hub/ http://127.0.0.1:9055/hub/
    ProxyPassReverse /hub/ http://127.0.0.1:9055/hub/
</VirtualHost>
