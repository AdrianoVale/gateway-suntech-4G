name: Deploy Gateway Sunteh

on:
  push:
    branches:
      - production
      - main
  workflow_dispatch:

concurrency:
  group: deploy-gateway-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    name: Validar Implementação (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Validar Compilação e Sintaxe
        run: dotnet build -c Release

  deploy:
    name: Deploy via SCP & SSH
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publicar Binários Otimizados para Linux
        run: |
          dotnet publish -c Release -r linux-x64 --self-contained false -o ./dist

      - name: Transferir arquivos compilados (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "dist/*"
          target: "/tmp/gateway-deploy"
          strip_components: 1

      - name: Atualizar e Reiniciar Serviço (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            echo "=== Iniciando Deploy do Gateway Sunteh (Preservando Cache) ==="

            # 1. Para o serviço com segurança
            echo "Parando o serviço gateway-sunteh..."
            sudo -n systemctl stop gateway-sunteh || true

            # 2. Limpeza mantendo a pasta cache
            echo "Limpando arquivos antigos (preservando pasta cache)..."
            sudo -n find /opt/gateway-sunteh -mindepth 1 -not -path '/opt/gateway-sunteh/cache*' -delete

            # 3. Copia exatamente como mapeado no sudoers
            echo "Copiando novos binários..."
            sudo -n cp -r /tmp/gateway-deploy/* /opt/gateway-sunteh/

            # 4. Criação da pasta de log (agora liberada no sudoers)
            echo "Garantindo a existência da pasta de logs..."
            sudo -n mkdir -p /opt/gateway-sunteh/log

            # 5. Ajusta o dono do diretório mapeado com escape no sudoers
            echo "Ajustando permissões para blt_aplicacao..."
            sudo -n chown -R blt_aplicacao:blt_aplicacao /opt/gateway-sunteh
            
            # Executa o chmod usando o find (que já está liberado via curinga '*' no sudoers)
            sudo -n find /opt/gateway-sunteh -type d -exec chmod 755 {} \;
            sudo -n find /opt/gateway-sunteh -type f -exec chmod 644 {} \;

            # 6. Reinicia o daemon do systemd e o serviço
            echo "Iniciando o serviço gateway-sunteh..."
            sudo -n systemctl daemon-reload
            sudo -n systemctl start gateway-sunteh

            # 7. Aguarda a inicialização e exibe os logs
            sleep 3
            echo "=== Últimos logs do serviço ==="
            sudo -n journalctl -u gateway-sunteh --no-pager -n 25

            echo "=== Deploy do Gateway concluído com sucesso ==="